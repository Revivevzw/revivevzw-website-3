<main class="events-page">
    <app-hero height="50vh" imageSrc="assets/events-header.png" [imageAlt]="'EVENTS.HERO_ALT' | translate"
        [title]="'EVENTS.TITLE' | translate"></app-hero>
    <section class="container container-card">
        <app-breadcrumbs></app-breadcrumbs>
        <div class="events-grid">
            @if (loading()) {
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <p>{{ 'EVENTS.LOADING' | translate }}</p>
            </div>
            } @else {
            @for (event of events(); track event.id) {
            <app-activity-card [externalLink]="'https://shop.revivevzw.be/ACTIVITEITEN/oneact60.aspx?ID=' + event.id"
                [imageSrc]="event.mainImage || 'https://shop.revivevzw.be/getACTimgfromsql.aspx?id=' + event.id"
                [imageAlt]="event.name | localize" [date]="event.startDate" [title]="event.name | localize"
                [description]="event.description | localize">
            </app-activity-card>
            } @empty {
            <p class="no-events">{{ 'EVENTS.EMPTY' | translate }}</p>
            }
            }
        </div>
    </section>
</main>
