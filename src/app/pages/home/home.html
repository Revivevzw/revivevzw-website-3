<app-hero imageSrc="assets/home-page-header.jpg" [imageAlt]="'HOME.HERO.ALT' | translate"
    [title]="'HOME.HERO.TITLE' | translate"></app-hero>

<div class="container home-content main-container">
    <app-split-content-card id="onze-missie" imageSrc="assets/our-mission.jpg" [imageAlt]="'HOME.MISSION.ALT' | translate"
        [label]="'HOME.MISSION.LABEL' | translate"
        [title]="'HOME.MISSION.TITLE' | translate">
        <p [innerHTML]="'HOME.MISSION.P1' | translate"></p>

        <!-- <div actions>
            <button class="btn-primary">Onze missie</button>
        </div> -->
    </app-split-content-card>

    <div class="spacer"></div>

    <app-info-block id="wie-zijn-we" [label]="'HOME.INFO.LABEL' | translate" [title]="'HOME.INFO.TITLE' | translate">
        <p [innerHTML]="'HOME.INFO.P1' | translate"></p>
    </app-info-block>

    <div class="cards-container">
        <app-icon-card [title]="'HOME.CARDS.CARD1.TITLE' | translate" iconBackgroundColor="var(--color-cream-300)">
            <img icon src="assets/globe.svg" [alt]="'HOME.CARDS.CARD1.Icon_ALT' | translate" />
            <p [innerHTML]="'HOME.CARDS.CARD1.P' | translate"></p>
        </app-icon-card>

        <app-icon-card [title]="'HOME.CARDS.CARD2.TITLE' | translate" iconBackgroundColor="var(--color-blue-200)">
            <img icon src="assets/volunteer.svg" [alt]="'HOME.CARDS.CARD2.Icon_ALT' | translate" />
            <p [innerHTML]="'HOME.CARDS.CARD2.P' | translate"></p>
        </app-icon-card>

        <app-icon-card [title]="'HOME.CARDS.CARD3.TITLE' | translate" iconBackgroundColor="var(--color-stone-300)">
            <img icon src="assets/training.svg" [alt]="'HOME.CARDS.CARD3.Icon_ALT' | translate" />
            <p [innerHTML]="'HOME.CARDS.CARD3.P' | translate"></p>
        </app-icon-card>
    </div>
</div>
