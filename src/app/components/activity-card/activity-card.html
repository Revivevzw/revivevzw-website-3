@if (link) {
<a [routerLink]="link" class="activity-card-link">
    <ng-container *ngTemplateOutlet="cardContent"></ng-container>
</a>
} @else {
<a [href]="externalLink" target="_blank" class="activity-card-link">
    <ng-container *ngTemplateOutlet="cardContent"></ng-container>
</a>
}

<ng-template #cardContent>
    <div class="activity-card">
        <div class="card-image">
            <div class="card-image-background" [style.background-image]="imageSrc ? 'url(\'' + imageSrc + '\')' : null"></div>
            <img [src]="imageSrc" [alt]="imageAlt || title">
        </div>
        <div class="card-content">
            <div class="card-date" *ngIf="date">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-calendar">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span>{{ date | date:'d MMMM y' : undefined : translate.currentLang }}</span>
            </div>
            <h3>{{ title }}</h3>
            <p class="card-description" *ngIf="description">{{ description }}</p>
        </div>
    </div>
</ng-template>
